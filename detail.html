<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="横眉·鲁迅文化数字展馆内容详情页面。"
    >

    <title>
        内容详情｜横眉·鲁迅文化数字展馆
    </title>

    <link
        rel="stylesheet"
        href="assets/css/reset.css"
    >

    <link
        rel="stylesheet"
        href="assets/css/variables.css"
    >

    <link
        rel="stylesheet"
        href="assets/css/common.css"
    >

    <link
        rel="stylesheet"
        href="assets/css/detail.css"
    >
	<link
    rel="stylesheet"
    href="assets/css/favorite.css"
>
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <a
                class="brand"
                href="index.html"
            >
                <span class="brand-seal">
                    横
                </span>

                <span class="brand-text">
                    <strong>横眉</strong>

                    <small>
                        鲁迅文化数字展馆
                    </small>
                </span>
            </a>

            <div class="header-tools">
                <nav
                    class="site-nav"
                    aria-label="主要导航"
                >
                    <a
                        class="nav-link"
                        href="index.html"
                    >
                        首页
                    </a>

                    <a
                        class="nav-link"
                        href="biography.html"
                    >
                        鲁迅生平
                    </a>

                    <a
                        class="nav-link active"
                        href="works.html"
                    >
                        代表作品
                    </a>

                    <a
                        class="nav-link"
                        href="relations.html"
                    >
                        人物关系
                    </a>

                    <a
                        class="nav-link"
                        href="quotes.html"
                    >
                        经典语录
                    </a>

                    <a
                        class="nav-link"
                        href="history.html"
                    >
                        时代背景
                    </a>

                    <a
                        class="nav-link"
                        href="articles.html"
                    >
                        作品赏析
                    </a>

                    <a
                        class="nav-link"
                        href="gallery.html"
                    >
                        历史影像
                    </a>
                </nav>

                <div
                    class="account-actions"
                    data-auth-actions
                    aria-live="polite"
                >
                    <a
                        class="account-link"
                        href="auth.html"
                    >
                        登录 / 注册
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="detail-section">
            <div class="container">
                <div class="detail-toolbar">
                    <a
                        class="detail-back-link"
                        href="works.html"
                        data-detail-back
                    >
                        返回内容列表
                    </a>

                    <div
                        class="detail-source"
                        data-detail-source
                        data-source="loading"
                        aria-live="polite"
                    >
                        数据来源：正在检测
                    </div>
                </div>

                <div
                    class="detail-warning"
                    data-detail-warning
                    role="status"
                    hidden
                ></div>

                <div
                    class="detail-state"
                    data-detail-state
                    aria-live="polite"
                >
                    <strong>
                        正在读取内容
                    </strong>

                    <span>
                        请稍候……
                    </span>
                </div>

                <article
                    class="detail-article"
                    data-detail-article
                    hidden
                >
                    <header class="detail-heading">
                        <div
                            class="detail-type"
                            data-detail-type
                        ></div>

                        <h1
                            class="detail-title"
                            data-detail-title
                        ></h1>

                        <p
                            class="detail-summary"
                            data-detail-summary
                        ></p>
						<div class="detail-heading-actions">
    <button
        class="favorite-button"
        type="button"
        data-favorite-button
        aria-pressed="false"
        disabled
    >
        正在检测收藏状态
    </button>
</div>
                    </header>

                    <div class="detail-layout">
                        <aside class="detail-sidebar">
                            <div
                                class="detail-image-wrapper"
                                data-detail-image-wrapper
                                hidden
                            >
                                <img
                                    class="detail-image"
                                    data-detail-image
                                    src=""
                                    alt=""
                                    hidden
                                >

                                <div
                                    class="detail-image-placeholder"
                                    data-detail-image-placeholder
                                    hidden
                                >
                                    历史影像资料图
                                </div>
                            </div>

                            <div class="detail-meta-title">
                                ARCHIVE INFORMATION
                            </div>

                            <dl
                                class="detail-meta-list"
                                data-detail-metadata
                            ></dl>
                        </aside>

                        <div class="detail-content">
                            <h2
                                class="detail-content-heading"
                                data-detail-body-heading
                            >
                                内容正文
                            </h2>

                            <div
                                class="detail-body"
                                data-detail-body
                            ></div>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>
                © 2026 横眉·鲁迅文化数字展馆
                ·《数据技术实训》课程大作业
            </p>
        </div>
    </footer>

    <script
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7"
    ></script>

    <script
        type="module"
        src="assets/js/auth-state.js"
    ></script>

    <script
        type="module"
        src="assets/js/detail.js"
    ></script>
</body>
</html>

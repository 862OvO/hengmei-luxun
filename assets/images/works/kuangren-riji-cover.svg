<svg
    xmlns="http://www.w3.org/2000/svg"
    width="900"
    height="1200"
    viewBox="0 0 900 1200"
    role="img"
    aria-labelledby="title description"
>
    <title id="title">《狂人日记》原创视觉封面</title>
    <desc id="description">
        米白纸张、暗红边框、黑色竖排书名与红色印章组成的民国书刊风格封面
    </desc>

    <defs>
        <pattern
            id="paper"
            width="28"
            height="28"
            patternUnits="userSpaceOnUse"
        >
            <rect width="28" height="28" fill="#f3ead8" />
            <circle cx="5" cy="8" r="0.8" fill="#8b765f" opacity="0.16" />
            <circle cx="21" cy="19" r="0.7" fill="#8b765f" opacity="0.12" />
        </pattern>
    </defs>

    <rect width="900" height="1200" fill="url(#paper)" />
    <rect x="48" y="48" width="804" height="1104" fill="none" stroke="#8d1f1f" stroke-width="4" />
    <rect x="76" y="76" width="748" height="1048" fill="none" stroke="#8d1f1f" stroke-width="1.5" opacity="0.72" />
    <path d="M130 170 H770" stroke="#1f1c19" stroke-width="2" opacity="0.36" />

    <text x="450" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="28" letter-spacing="8" fill="#8d1f1f">
        SELECTED WORKS · 1918
    </text>

    <text x="548" y="340" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="118" font-weight="700" fill="#201d1a">狂</text>
    <text x="548" y="490" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="118" font-weight="700" fill="#201d1a">人</text>
    <text x="548" y="640" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="118" font-weight="700" fill="#201d1a">日</text>
    <text x="548" y="790" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="118" font-weight="700" fill="#201d1a">记</text>

    <line x1="360" y1="270" x2="360" y2="860" stroke="#8d1f1f" stroke-width="3" />

    <text x="278" y="350" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="42" fill="#4d4640">鲁</text>
    <text x="278" y="420" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="42" fill="#4d4640">迅</text>
    <text x="278" y="540" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="24" letter-spacing="5" fill="#6b5e54">短篇小说</text>

    <rect x="235" y="760" width="86" height="86" rx="5" fill="#8d1f1f" />
    <text x="278" y="813" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="23" fill="#fffaf0">横眉</text>

    <text x="450" y="1038" text-anchor="middle" font-family="'Songti SC','SimSun',serif" font-size="24" letter-spacing="6" fill="#4d4640">
        本站原创视觉封面
    </text>

    <path d="M130 1080 H770" stroke="#1f1c19" stroke-width="2" opacity="0.36" />
</svg>
